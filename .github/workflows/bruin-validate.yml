name: Bruin PR Validate

on:
  push:
    branches: [main]
    paths:
      - "citibike-pipeline/**"
      
jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: bruin-data/setup-bruin@main

      - name: Validate Pipeline
        run: bruin validate ./citibike-pipeline/